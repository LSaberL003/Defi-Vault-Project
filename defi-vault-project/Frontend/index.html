<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DeFi Vault Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>DeFi Vault</h1>
        <p class="subtitle">Deposit ERC20 tokens, receive vault shares...</p>
      </div>
      <button id="connectBtn">Connect Wallet</button>
    </div>

    <div class="grid">
      <div class="card account-card">
        <h2>Account</h2>
        <p id="account">Not connected</p>
      </div>

      <div class="card">
        <h2>Balances</h2>
        <p>ERC20 Token: <span id="tokenBalance">0</span></p>
        <p>Vault Token: <span id="vaultBalance">0</span></p>
        <p>Governance: <span id="membershipStatus">No</span></p>
      </div>

      <div class="card">
        <h2>Approve Vault</h2>
        <input id="approveAmount" type="number" placeholder="Amount" />
        <button id="approveBtn">Approve</button>
      </div>

      <div class="card">
        <h2>Deposit</h2>
        <input id="depositAmount" type="number" placeholder="Amount" />
        <button id="depositBtn">Deposit</button>
      </div>

      <div class="card">
        <h2>Withdraw</h2>
        <input id="withdrawAmount" type="number" placeholder="Shares" />
        <button id="withdrawBtn">Withdraw</button>
      </div>

      <div class="card">
        <h2>Status</h2>
        <p id="status">Ready</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
